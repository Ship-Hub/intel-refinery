image: node:22.17.0

stages:
  - test
  - deploy

variables:
  BACKEND_DEPLOY_PATH: "/var/www/intel-engine/api"
  PM2_API_NAME: "intel-engine-api"
  PM2_WORKER_NAME: "intel-engine-worker"
  DEPLOY_PORT: "22"

test_backend:
  stage: test
  rules:
    - if: '$CI_COMMIT_BRANCH'
  script:
    - node --version
    - npm --version
    - npm ci
    - npm test

deploy_backend:
  stage: deploy
  needs:
    - test_backend
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apt-get update -y
    - apt-get install -y openssh-client
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - test -n "$DEPLOY_HOST"
    - test -n "$DEPLOY_USER"
    - test -n "$SSH_PRIVATE_KEY"
    - test -n "$SSH_KNOWN_HOSTS"
    - eval $(ssh-agent -s)
    - chmod 400 "$SSH_PRIVATE_KEY"
    - ssh-add "$SSH_PRIVATE_KEY"
    - cp "$SSH_KNOWN_HOSTS" ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - export SSH_PORT="${DEPLOY_PORT:-22}"
    - export SSH_TARGET="$DEPLOY_USER@$DEPLOY_HOST"
    - export SSH_CMD="ssh -p $SSH_PORT"
  script:
    - test -n "$BACKEND_DEPLOY_PATH"
    - $SSH_CMD "$SSH_TARGET" "mkdir -p '$BACKEND_DEPLOY_PATH'"
    - tar --exclude='.git' --exclude='node_modules' --exclude='.env' --exclude='uploads' --exclude='*.log' --exclude='server-test.err' --exclude='server-test.out' -czf - . | $SSH_CMD "$SSH_TARGET" "tar -xzf - -C '$BACKEND_DEPLOY_PATH'"
    - $SSH_CMD "$SSH_TARGET" "export PATH=/usr/local/bin:/usr/bin:/bin:$HOME/.nvm/versions/node/v22.17.0/bin:$PATH; if [ -s $HOME/.nvm/nvm.sh ]; then . $HOME/.nvm/nvm.sh; fi; if ! command -v node >/dev/null 2>&1; then apt-get update -y && apt-get install -y ca-certificates curl gnupg && curl -fsSL https://deb.nodesource.com/setup_22.x | bash - && apt-get install -y nodejs; fi; cd '$BACKEND_DEPLOY_PATH' && node --version && npm --version && (command -v pm2 >/dev/null || npm install -g pm2) && npm ci --omit=dev && pm2 delete '$PM2_API_NAME' 2>/dev/null; pm2 start server.js --name '$PM2_API_NAME' && pm2 delete '$PM2_WORKER_NAME' 2>/dev/null; pm2 start worker.js --name '$PM2_WORKER_NAME' && pm2 save"
  environment:
    name: production
