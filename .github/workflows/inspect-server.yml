name: Inspect Production Server

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Inspect Nginx and PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USER }}
          key: ${{ secrets.CONTABO_SSH_KEY }}
          port: ${{ secrets.CONTABO_SSH_PORT }}
          script: |
            set -e
            echo "== hostname =="
            hostname
            echo "== nginx enabled sites =="
            ls -la /etc/nginx/sites-enabled || true
            echo "== matching server names =="
            grep -R "server_name .*intelrefinery\\|server_name .*aicostpilot\\|ssl_certificate" -n /etc/nginx/sites-enabled /etc/nginx/sites-available 2>/dev/null || true
            echo "== intel refinery site file =="
            sed -n '1,220p' /etc/nginx/sites-available/intel-refinery || true
            echo "== certbot names for intelrefinery =="
            find /etc/letsencrypt/live -maxdepth 1 -type d -name '*intel*' -print 2>/dev/null || true
            echo "== letsencrypt live =="
            find /etc/letsencrypt/live -maxdepth 2 -type l -o -type f 2>/dev/null | sort || true
            echo "== pm2 =="
            pm2 list || true
            echo "== intel refinery pm2 details =="
            pm2 describe intel-refinery-api || true
            pm2 describe intel-refinery-bot || true
            echo "== intel refinery recent logs =="
            pm2 logs intel-refinery-api --nostream --lines 20 || true
            pm2 logs intel-refinery-bot --nostream --lines 20 || true
            echo "== bot api auth probe =="
            grep -q 'getTrustedBotKey' /var/www/intel-refinery/current/api/src/middleware/apiKeyAuth.js && echo "deployed fallback code: yes" || echo "deployed fallback code: no"
            node -e "const fs=require('fs'); const p='/var/www/intel-refinery-bot/shared/bot.env'; const c=fs.readFileSync(p,'utf8'); const l=c.replace(/\r\n/g,'\n').split('\n').find(x=>x.startsWith('BACKEND_API_KEY=')); console.log('api can read bot key file:', Boolean(l && l.slice('BACKEND_API_KEY='.length).trim().replace(/^['\"]|['\"]$/g,'')));"
            BOT_KEY="$(grep -E '^BACKEND_API_KEY=' /var/www/intel-refinery-bot/shared/bot.env | tail -1 | cut -d= -f2- | sed 's/\r$//')"
            API_PID="$(pm2 pid intel-refinery-api || true)"
            if [ -n "$API_PID" ] && [ -r "/proc/$API_PID/environ" ]; then
              tr '\0' '\n' < "/proc/$API_PID/environ" | grep -q '^BOT_BACKEND_API_KEY=' && echo "api env has bot key: yes" || echo "api env has bot key: no"
            fi
            if [ -n "$BOT_KEY" ]; then
              curl -sS -o /tmp/intel-refinery-bot-auth-probe.json -w "bot auth status: %{http_code}\n" -H "x-api-key: $BOT_KEY" "http://127.0.0.1:5000/api/moderator-audits/monitors?platform=telegram" || true
              sed -E 's/"error":"[^"]+"/"error":"<redacted>"/g' /tmp/intel-refinery-bot-auth-probe.json || true
              echo
            else
              echo "bot key present: no"
            fi
