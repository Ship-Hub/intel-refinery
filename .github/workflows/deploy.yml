name: Deploy Intel Refinery

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: intel-refinery-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            api/package-lock.json

      - name: Build frontend
        env:
          VITE_API_BASE_URL: https://api.intelrefinery.site
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: |
          test -f frontend/package-lock.json
          npm --prefix frontend ci
          npm --prefix frontend run build

      - name: Package release
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='frontend/node_modules' \
            --exclude='api/node_modules' \
            --exclude='tg-bot' \
            --exclude='*.log' \
            -czf intel-refinery-release.tgz \
            api frontend/dist frontend/public ecosystem.config.cjs package.json README.md DEPLOYMENT.md

      - name: Upload release bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USER }}
          key: ${{ secrets.CONTABO_SSH_KEY }}
          port: ${{ secrets.CONTABO_SSH_PORT }}
          source: intel-refinery-release.tgz
          target: /tmp

      - name: Activate release
        uses: appleboy/ssh-action@v1.0.3
        env:
          API_ENV_FILE: ${{ secrets.API_ENV_FILE }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USER }}
          key: ${{ secrets.CONTABO_SSH_KEY }}
          port: ${{ secrets.CONTABO_SSH_PORT }}
          envs: API_ENV_FILE,MYSQL_ROOT_PASSWORD
          script: |
            set -euo pipefail

            APP_DIR=/var/www/intel-refinery
            RELEASE_DIR="$APP_DIR/releases/${{ github.sha }}"
            SHARED_DIR="$APP_DIR/shared"

            mkdir -p "$RELEASE_DIR" "$SHARED_DIR"
            tar -xzf /tmp/intel-refinery-release.tgz -C "$RELEASE_DIR"

            if [ -n "${API_ENV_FILE:-}" ]; then
              printf '%s\n' "$API_ENV_FILE" > "$SHARED_DIR/api.env"
              chmod 600 "$SHARED_DIR/api.env"
            fi

            if [ -f "$SHARED_DIR/api.env" ]; then
              cp "$SHARED_DIR/api.env" "$RELEASE_DIR/api/.env"
            else
              cp "$RELEASE_DIR/api/.env.example" "$RELEASE_DIR/api/.env"
              sed -i 's/^NODE_ENV=.*/NODE_ENV=production/' "$RELEASE_DIR/api/.env"
              sed -i 's/^PORT=.*/PORT=5000/' "$RELEASE_DIR/api/.env"
              sed -i 's|^FRONTEND_BASE_URL=.*|FRONTEND_BASE_URL=https://app.intelrefinery.site|' "$RELEASE_DIR/api/.env"
            fi

            sed -i 's/\r$//' "$RELEASE_DIR/api/.env"
            if [ -f /var/www/intel-refinery-bot/shared/bot.env ] && ! grep -q '^BOT_BACKEND_API_KEY=' "$RELEASE_DIR/api/.env"; then
              BOT_BACKEND_API_KEY="$(grep -E '^BACKEND_API_KEY=' /var/www/intel-refinery-bot/shared/bot.env | tail -1 | cut -d= -f2- | sed 's/\r$//')"
              if [ -n "$BOT_BACKEND_API_KEY" ]; then
                printf '\nBOT_BACKEND_API_KEY=%s\n' "$BOT_BACKEND_API_KEY" >> "$RELEASE_DIR/api/.env"
                cp "$RELEASE_DIR/api/.env" "$SHARED_DIR/api.env"
                chmod 600 "$SHARED_DIR/api.env"
              fi
            fi
            DB_NAME="$(grep -E '^DB_NAME=' "$RELEASE_DIR/api/.env" | tail -1 | cut -d= -f2-)"
            DB_USER="$(grep -E '^DB_USER=' "$RELEASE_DIR/api/.env" | tail -1 | cut -d= -f2-)"
            DB_PASSWORD="$(grep -E '^DB_PASSWORD=' "$RELEASE_DIR/api/.env" | tail -1 | cut -d= -f2-)"

            mysql_exec() {
              if mysql -e "SELECT 1" >/dev/null 2>&1; then
                mysql "$@"
              elif [ -n "${MYSQL_ROOT_PASSWORD:-}" ] && mysql -uroot -p"$MYSQL_ROOT_PASSWORD" -e "SELECT 1" >/dev/null 2>&1; then
                mysql -uroot -p"$MYSQL_ROOT_PASSWORD" "$@"
              else
                echo "Unable to access MySQL as root for database bootstrap" >&2
                return 1
              fi
            }

            mysql_exec <<SQL
            CREATE DATABASE IF NOT EXISTS \`${DB_NAME}\` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
            CREATE USER IF NOT EXISTS '${DB_USER}'@'localhost' IDENTIFIED BY '${DB_PASSWORD}';
            ALTER USER '${DB_USER}'@'localhost' IDENTIFIED BY '${DB_PASSWORD}';
            GRANT ALL PRIVILEGES ON \`${DB_NAME}\`.* TO '${DB_USER}'@'localhost';
            FLUSH PRIVILEGES;
            SQL

            mysql_exec "$DB_NAME" <<SQL
            CREATE TABLE IF NOT EXISTS schema_migrations (
              filename VARCHAR(255) PRIMARY KEY,
              applied_at DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP
            );
            SQL

            migration_applied() {
              local filename="$1"
              local filename_sql
              local count
              filename_sql="$(printf '%s' "$filename" | sed "s/'/''/g")"
              count="$(mysql_exec -Nse "SELECT COUNT(*) FROM schema_migrations WHERE filename = '$filename_sql'" "$DB_NAME")"
              [ "$count" = "1" ]
            }

            mark_migration_applied() {
              local filename="$1"
              local filename_sql
              filename_sql="$(printf '%s' "$filename" | sed "s/'/''/g")"
              mysql_exec -e "INSERT IGNORE INTO schema_migrations (filename) VALUES ('$filename_sql')" "$DB_NAME"
            }

            apply_migration() {
              local schema_file="$1"
              local filename
              filename="$(basename "$schema_file")"
              if migration_applied "$filename"; then
                echo "Skipping already-applied migration: $filename"
                return 0
              fi

              echo "Applying migration: $filename"
              mysql_exec "$DB_NAME" < "$schema_file"
              mark_migration_applied "$filename"
            }

            existing_refinery_db=0
            if mysql_exec -Nse "SHOW TABLES LIKE 'projects'" "$DB_NAME" | grep -q '^projects$'; then
              existing_refinery_db=1
            fi

            while IFS= read -r schema_file; do
              filename="$(basename "$schema_file")"
              prefix="${filename%%_*}"

              if [ "$existing_refinery_db" = "1" ]; then
                case "$schema_file" in
                  */api/database/migrations/*)
                    mark_migration_applied "$filename"
                    continue
                    ;;
                esac

                if printf '%s' "$prefix" | grep -Eq '^[0-9]+$' && [ "$prefix" -lt 13 ]; then
                  mark_migration_applied "$filename"
                  continue
                fi
              fi

              apply_migration "$schema_file"
            done < <(
              find "$RELEASE_DIR/api/database/migrations" -maxdepth 1 -type f -name '*.sql' | sort
              find "$RELEASE_DIR/api/database" -maxdepth 1 -type f -name '*.sql' | sort
            )

            cd "$RELEASE_DIR/api"
            npm ci --omit=dev || npm install --omit=dev

            ln -sfn "$RELEASE_DIR" "$APP_DIR/current"

            cat > /etc/nginx/sites-available/intel-refinery <<'NGINX'
            server {
              listen 80;
              listen [::]:80;
              server_name intelrefinery.site www.intelrefinery.site;
              root /var/www/intel-refinery/current/frontend/dist;
              index index.html;

              location / {
                try_files $uri $uri/ /index.html;
              }
            }

            server {
              listen 80;
              listen [::]:80;
              server_name app.intelrefinery.site;
              root /var/www/intel-refinery/current/frontend/dist;
              index index.html;

              location / {
                try_files $uri $uri/ /index.html;
              }
            }

            server {
              listen 80;
              listen [::]:80;
              server_name api.intelrefinery.site;

              location / {
                proxy_pass http://127.0.0.1:5000;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
              }
            }
            NGINX

            ln -sfn /etc/nginx/sites-available/intel-refinery /etc/nginx/sites-enabled/intel-refinery
            nginx -t
            systemctl reload nginx

            CERT_DIR=/etc/letsencrypt/live/intelrefinery.site
            if [ ! -f "$CERT_DIR/fullchain.pem" ] || [ ! -f "$CERT_DIR/privkey.pem" ]; then
              if command -v certbot >/dev/null 2>&1; then
                certbot --nginx -n --agree-tos --register-unsafely-without-email \
                  -d intelrefinery.site \
                  -d www.intelrefinery.site \
                  -d app.intelrefinery.site \
                  -d api.intelrefinery.site
              else
                apt-get update
                apt-get install -y certbot python3-certbot-nginx
                certbot --nginx -n --agree-tos --register-unsafely-without-email \
                  -d intelrefinery.site \
                  -d www.intelrefinery.site \
                  -d app.intelrefinery.site \
                  -d api.intelrefinery.site
              fi
            fi

            if [ -f "$CERT_DIR/fullchain.pem" ] && [ -f "$CERT_DIR/privkey.pem" ]; then
              cat > /etc/nginx/sites-available/intel-refinery <<'NGINX_SSL'
            server {
              listen 80;
              listen [::]:80;
              server_name intelrefinery.site www.intelrefinery.site app.intelrefinery.site api.intelrefinery.site;

              location /.well-known/acme-challenge/ {
                root /var/www/intel-refinery/current/frontend/dist;
              }

              location / {
                return 301 https://$host$request_uri;
              }
            }

            server {
              listen 443 ssl;
              listen [::]:443 ssl;
              server_name intelrefinery.site www.intelrefinery.site;

              ssl_certificate /etc/letsencrypt/live/intelrefinery.site/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/intelrefinery.site/privkey.pem;

              root /var/www/intel-refinery/current/frontend/dist;
              index index.html;

              location / {
                try_files $uri $uri/ /index.html;
              }
            }

            server {
              listen 443 ssl;
              listen [::]:443 ssl;
              server_name app.intelrefinery.site;

              ssl_certificate /etc/letsencrypt/live/intelrefinery.site/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/intelrefinery.site/privkey.pem;

              root /var/www/intel-refinery/current/frontend/dist;
              index index.html;

              location / {
                try_files $uri $uri/ /index.html;
              }
            }

            server {
              listen 443 ssl;
              listen [::]:443 ssl;
              server_name api.intelrefinery.site;

              ssl_certificate /etc/letsencrypt/live/intelrefinery.site/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/intelrefinery.site/privkey.pem;

              location / {
                proxy_pass http://127.0.0.1:5000;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
              }
            }
            NGINX_SSL

              nginx -t
              systemctl reload nginx
            fi

            cd "$APP_DIR/current"
            if command -v pm2 >/dev/null 2>&1; then
              pm2 startOrReload ecosystem.config.cjs --update-env
              pm2 save
            else
              npm install -g pm2
              pm2 start ecosystem.config.cjs --update-env
              pm2 save
            fi

            curl -fsS http://127.0.0.1:5000/health >/dev/null
            curl -fsS -H 'Host: intelrefinery.site' http://127.0.0.1/ >/dev/null
