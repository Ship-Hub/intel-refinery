name: Production Refinement Debug

on:
  workflow_dispatch:
    inputs:
      pdf_b64:
        description: Base64-encoded PDF fixture
        required: true
      url_one:
        description: First URL source
        required: true
      url_two:
        description: Second URL source
        required: true
      url_three:
        description: Third URL source
        required: true

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Run production refinement smoke with live logs
        uses: appleboy/ssh-action@v1.0.3
        env:
          PDF_B64: ${{ inputs.pdf_b64 }}
          URL_ONE: ${{ inputs.url_one }}
          URL_TWO: ${{ inputs.url_two }}
          URL_THREE: ${{ inputs.url_three }}
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USER }}
          key: ${{ secrets.CONTABO_SSH_KEY }}
          port: ${{ secrets.CONTABO_SSH_PORT }}
          envs: PDF_B64,URL_ONE,URL_TWO,URL_THREE
          script: |
            set -euo pipefail

            APP_DIR=/var/www/intel-refinery/current
            API_DIR="$APP_DIR/api"
            WORK_DIR=/tmp/intel-refinery-debug
            mkdir -p "$WORK_DIR"
            printf '%s' "$PDF_B64" | base64 -d > "$WORK_DIR/input.pdf"

            echo "::group::live api logs"
            (pm2 logs intel-refinery-api --lines 0 --nostream 2>/dev/null || true)
            (pm2 logs intel-refinery-api --lines 200 2>&1 | sed -u 's/^/[api] /') &
            LOG_PID=$!
            trap 'kill "$LOG_PID" 2>/dev/null || true' EXIT
            echo "::endgroup::"

            cd "$API_DIR"
            SESSION_TOKEN="$(node <<'NODE'
            require("dotenv").config();
            const db = require("./src/config/db");
            const { createUserSession } = require("./src/auth/services/sessionService");

            (async () => {
              const [rows] = await db.promise().query(`
                SELECT u.id AS userId
                FROM users u
                JOIN account_members am ON am.user_id = u.id
                WHERE u.status = 'active'
                ORDER BY u.id ASC
                LIMIT 1
              `);
              if (!rows[0]) throw new Error("No active user with account membership found");
              const session = await createUserSession({ userId: rows[0].userId, ttlDays: 1 });
              console.log(session.token);
              process.exit(0);
            })().catch((err) => {
              console.error(err.message);
              process.exit(1);
            });
            NODE
            )"
            export SESSION_TOKEN

            node <<'NODE'
            const fs = require("fs");
            const path = require("path");

            const token = process.env.SESSION_TOKEN;
            const urls = [process.env.URL_ONE, process.env.URL_TWO, process.env.URL_THREE];
            const pdfPath = "/tmp/intel-refinery-debug/input.pdf";
            const base = "https://api.intelrefinery.site";

            const request = async (url, options = {}) => {
              const response = await fetch(url, {
                ...options,
                headers: {
                  Authorization: `Bearer ${token}`,
                  ...(options.headers || {}),
                },
              });
              const text = await response.text();
              let payload;
              try { payload = JSON.parse(text); } catch { payload = { raw: text }; }
              console.log(`${options.method || "GET"} ${url.replace(base, "")} -> ${response.status}`);
              if (!response.ok || payload.success === false) {
                console.log(JSON.stringify(payload, null, 2));
                throw new Error(`Request failed: ${response.status}`);
              }
              return payload.data;
            };

            (async () => {
              const project = await request(`${base}/api/v1/projects`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  title: `Production smoke ${new Date().toISOString()}`,
                  refineryProfile: "general",
                  intent: "general_research",
                  mode: "quick",
                }),
              });

              const form = new FormData();
              const bytes = fs.readFileSync(pdfPath);
              form.append("source", new Blob([bytes], { type: "application/pdf" }), path.basename(pdfPath));
              form.append("title", "Jephtah Oyelabi AI Product Engineer CV");
              form.append("displayName", "Jephtah Oyelabi AI Product Engineer CV");
              form.append("sourceCategory", "other");
              await request(`${base}/api/v1/projects/${project.id}/sources/upload`, {
                method: "POST",
                body: form,
              });

              for (const url of urls) {
                await request(`${base}/api/v1/projects/${project.id}/sources/url`, {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                    sourceType: "url",
                    uri: url,
                    title: new URL(url).hostname,
                    displayName: new URL(url).hostname,
                    sourceCategory: "other",
                  }),
                });
              }

              const run = await request(`${base}/api/v1/projects/${project.id}/refine`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({}),
              });

              const runId = run.runId || run.id || "latest";
              for (let i = 0; i < 90; i += 1) {
                await new Promise((resolve) => setTimeout(resolve, 5000));
                const status = await request(`${base}/api/v1/projects/${project.id}/runs/${runId}`);
                console.log(`run ${runId}: ${status.status} ${status.progress}% ${status.message || ""}`);
                if (status.status === "completed" || status.status === "failed") {
                  console.log(JSON.stringify(status, null, 2));
                  if (status.status === "failed") process.exit(2);
                  process.exit(0);
                }
              }
              throw new Error("Run did not finish within smoke timeout");
            })().catch((err) => {
              console.error(err.stack || err.message);
              process.exit(1);
            });
            NODE
